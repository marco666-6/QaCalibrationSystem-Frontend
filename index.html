<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="QA Calibration System frontend" />
    <meta name="keywords" content="QA Calibration, Calibration System, Equipment Management" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="stylesheet" href="/assets/css/font_family.css" />
    <link rel="stylesheet" href="/assets/css/font_css.css" />
    <link rel="stylesheet" href="/assets/css/atelier-cave-light.min.css" />

    <title>QA Calibration System</title>

    <style>
      .matx-loader {
        display: inline-block;
        position: absolute;
        width: 40px;
        height: 40px;
        left: 0;
        right: 0;
        top: calc(50% - 20px);
        margin: auto;
      }

      .matx-loader img {
        position: absolute;
        height: 25px;
        width: auto;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        margin: auto;
      }

      .matx-loader div {
        box-sizing: border-box;
        display: block;
        position: absolute;
        width: 40px;
        height: 40px;
        margin: 0;
        border: 3.4px solid #1976d2;
        border-radius: 50%;
        animation: matx-loader 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
        border-color: #1976d2 transparent transparent transparent;
      }

      .matx-loader div:nth-child(1) {
        animation-delay: -0.45s;
      }

      .matx-loader div:nth-child(2) {
        animation-delay: -0.3s;
      }

      .matx-loader div:nth-child(3) {
        animation-delay: -0.15s;
      }

      @keyframes matx-loader {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div class="matx-loader">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
